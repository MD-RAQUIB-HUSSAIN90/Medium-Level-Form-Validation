<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <form novalidate>
        <h2>Registration Form</h2>

        <div class="field">
            <label for="username">Username</label>
            <input type="text" placeholder="Enter a name" id="username">
            <small>Atleast first letter will be capital</small>
        </div>

        <div class="field">
            <label for="contact">Contact</label>
            <input type="text" placeholder="Enter contact" id="contact">
            <small>Please enter valid number</small>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" placeholder="Enter password" id="password">
        </div>

        <div class="field">
            <label for="reEnterPassword">Re-enter Password</label>
            <input type="password" placeholder="Re enter password" id="reEnterPassword">
            <small>Password is not same</small>
        </div>

        <h5 class="emptyAllField"></h5>

        <input type="submit" value="Submit" id="btn">

        <h4 class="successMessage"></h4>
    </form>

    <script src="script.js"></script>

</body>

</html>
